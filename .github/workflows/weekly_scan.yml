name: Wekelijkse Crypto Sentiment Scan

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Python instellen
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: pip install anthropic

      - name: Scan uitvoeren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
        run: python scanner.py

      - name: Geschiedenis opslaan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment_history.json rapport.html || true
          git diff --staged --quiet || git commit -m "update $(date +%Y-%m-%d)"
          git push
